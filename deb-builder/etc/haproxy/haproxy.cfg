# /etc/haproxy/haproxy.cfg
global
    log /var/log/haproxy.log local0
    log /var/log/haproxy.log local1 notice
    chroot /var/lib/haproxy
    stats socket /run/haproxy/admin.sock mode 660 level admin expose-fd listeners
    stats timeout 30s
    user haproxy
    group haproxy
    daemon

defaults
    log global
    mode tcp
    option tcplog
    timeout connect 5000
    timeout client 1h
    timeout server 1h
    timeout tunnel 24h

frontend mqtt_frontend
    bind *:1883
    default_backend mqtt_backend

backend mqtt_backend
    # 轮询
    balance roundrobin
    option tcp-check
    tcp-check connect port 1883

    server mosquitto01 192.168.3.61:1883 check inter 5s rise 2 fall 3
    server mosquitto02 192.168.3.62:1883 check inter 5s rise 2 fall 3
    server mosquitto03 192.168.3.63:1883 check inter 5s rise 2 fall 3

listen stats
    bind *:8080
    mode http
    stats enable
    stats uri /haproxy?stats
    stats realm Haproxy\ Statistics
    stats auth <user-name>:<password>
    stats hide-version